services:
  - type: web
    name: docquest-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL_NAME
        value: gemini-2.0-flash
      - key: GEMINI_EMBEDDING_MODEL_NAME
        value: gemini-embedding-001
      - key: DATABASE_URL
        sync: false
      - key: TOP_K
        value: "5"
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: CORS_ORIGINS
        value: https://your-vercel-url.vercel.app,http://localhost:3000
      - key: DATA_DIR
        value: /tmp/data
      - key: STORAGE_DIR
        value: /tmp/storage
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false
      - key: AUTH_ALGORITHM
        value: HS256
      - key: AUTH_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: POSTGRES_SSLMODE
        value: require
